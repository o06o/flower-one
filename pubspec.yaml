name: flowerone
description: "A new flowerone Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # router
  go_router: ^17.0.1

  # UI
  flutter_screenutil: ^5.9.3
  fluttertoast: ^8.2.8
  lottie: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.15
  flutter_native_splash: 2.4.0

  # Flutter Gen
  flutter_gen_runner: ^5.10.0

  #RiverPod
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5

  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.5.1

  # database
  drift: ^2.28.1
  sqlite3: ^2.9.0
  sqlite3_flutter_libs: ^0.5.39

  # permission
  permission_handler: ^11.3.1

  path_provider: ^2.1.5
  path: ^1.9.1

  # utils
  logger: ^2.6.0
  package_info_plus: ^9.0.0

  # deep linking
  app_links: ^3.5.0

#  flutter_local_notifications: ^19.4.1

  intl: ^0.20.2
  firebase_core: ^4.6.0
  firebase_analytics: ^12.2.0
  firebase_messaging: ^16.1.3
  firebase_crashlytics: ^5.1.0
  supabase_flutter: ^2.10.2

  google_sign_in: ^7.2.0
  flutter_naver_map: ^1.4.4
  geolocator: ^14.0.2
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0

  injectable_generator: ^2.7.0

  build_runner: ^2.5.4
  json_serializable: ^6.8.0

  riverpod_generator: ^2.4.2
  riverpod_lint: ^2.3.12

  freezed: ^3.0.6

  drift_dev: ^2.23.0

flutter_gen:
  assets:
    outputs:
      package_parameter_enabled: false

  output: lib/core/resource/gen
  line_length: 120

  colors:
    inputs:
      - assets/colors/colors.xml

  integrations:
    flutter_svg: true

flutter:
  uses-material-design: true

  assets:
    - assets/colors/
    - assets/icons/
    - assets/images/
    - assets/lotties/
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/pretendard/Pretendard-Light.ttf
          weight: 300
        - asset: assets/fonts/pretendard/Pretendard-Regular.ttf
          weight: 400
        - asset: assets/fonts/pretendard/Pretendard-Medium.ttf
          weight: 500
        - asset: assets/fonts/pretendard/Pretendard-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/pretendard/Pretendard-Bold.ttf
          weight: 700
    - family: Hakgyoansim
      fonts:
        - asset: assets/fonts/hakgyoansim/Hakgyoansim-R.ttf
          weight: 400